name: Hupu Checkin

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run checkin
        env:
          HUPU_COOKIE: ${{ secrets.HUPU_COOKIE }}
        run: npm run checkin
